name: Update Servant Data JSON

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *' # 毎日JSTの21時に実行

jobs:
  update-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run update script
        uses: zejba/get-fgo-data@master
        with:
          servantDataJSONPath: src/data/servant_data.json

      - name: Commit and push changes
        id: commit_changes
        run: |
          git config --local user.email "66516617+zejba@users.noreply.github.com"
          git config --local user.name "zejba"
          git add src/data/servant_data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "committed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Update Servant Data JSON"
            git push
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger CD workflow
        if: steps.commit_changes.outputs.committed == 'true'
        run: |
          curl -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type":"servant-data-updated"}'
